<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
	<head>
		<title>MATRICO</title>

		<meta charset="utf-8"/>

		<style type="text/css">
			/*<![CDATA[*/
			body { white-space:pre; font-family:mono; }
			p,h1,h2 { display:inline-block; margin:0; }
			#term { width:80%; font-size:large; position:relative; }
			/*]]>*/
		</style>

		<script type="text/javascript" src="matrico_core.js"></script>
		<script type="text/javascript" src="matrico_face.js"></script>
		<script type="text/javascript" src="matrico_util.js"></script>
	</head>

	<body>
		<h1>MATRICO</h1>
		<h2>Output:</h2>

		<p id="out"></p>

		<input type="text" id="term"/>

		<script type="text/javascript">
//<![CDATA[

var out = document.getElementById("out");

A = matrico.zeros(4,4); echo(A,'A');
B = matrico.ones(4,4); echo(B,'B');
C = matrico.eye(4); echo(C,'C');
D = matrico.rand(4,4); echo(D,'D');
E = matrico.randn(4,4); echo(E,'E');
F = matrico.plus(matrico.ones(4,4),B); echo(F,'F'); alert(F)

document.getElementById("term").addEventListener("keypress", function(e) {
    if(e.keyCode==13) eval(document.getElementById("term").value);
});

//]]>
		</script>
	</body>
</html>
