<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
	<head>
		<title>MATRICO</title>

		<meta charset="utf-8"/>

		<style type="text/css">
			/*<![CDATA[*/
			body { white-space:pre; font-family:mono; }
			p,h1,h2 { display:inline-block; margin:0; }
			/*]]>*/
		</style>

		<script type="text/javascript" src="matrico.js"></script>
	</head>

	<body>
		<h1>MATRICO</h1>
		<h2>Output:</h2>

		<p id="out"></p>

		<script type="text/javascript">
//<![CDATA[

var out = document.getElementById("out");

A = matrico.zeros(4,4); out.innerHTML += "A = \n"+echo(A);
B = matrico.ones(4,4); out.innerHTML += "B = \n"+echo(B);
C = matrico.eye(4); out.innerHTML += "C = \n"+echo(C);
D = matrico.rand(4,4); out.innerHTML += "D = \n"+echo(D);
E = matrico.randn(4,4); out.innerHTML += "E = \n"+echo(E);
F = matrico.plus(matrico.ones(4,4),B); out.innerHTML += "F = \n"+echo(F);

//]]>
		</script>
	</body>
</html>
